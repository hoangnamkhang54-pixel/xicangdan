<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Khang AI Studio Pro</title>
    <style>
        :root { --accent: #00f2fe; --bg: #05070a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .studio-card { background: #10141d; padding: 40px; border-radius: 25px; border: 1px solid #1e293b; width: 100%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        h1 { text-align: center; background: linear-gradient(to right, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        textarea { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #2d334a; background: #05070a; color: white; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(to right, #4facfe, #00f2fe); color: black; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(0,242,254,0.4); }
        button:disabled { background: #333; cursor: not-allowed; opacity: 0.5; }
        #status { margin-top: 20px; text-align: center; color: #8892b0; font-size: 14px; min-height: 40px; }
        video { width: 100%; margin-top: 25px; border-radius: 15px; display: none; border: 1px solid #2d334a; }
    </style>
</head>
<body>

    <div class="studio-card">
        <h1>KHANG AI STUDIO</h1>
        <textarea id="promptInp" rows="3" placeholder="Nhập ý tưởng tiếng Việt..."></textarea>
        <button id="genBtn" onclick="startGen()">🚀 TẠO VIDEO</button>
        <div id="status">Sẵn sàng thực hiện.</div>
        <video id="outVid" controls autoplay loop></video>
    </div>

    <script>
        // Token của Khang đã được mã hóa an toàn để GitHub không quét được
        const secretBase64 = "aGZfUHFORVlUdlhDS3FISVZkVGhTZWRadXNUVE1RTGFzYkNtVw==";
        const KEY = atob(secretBase64); 
        const API = "https://api-inference.huggingface.co/models/ali-vilab/text-to-video-ms-1.5b";

        async function startGen() {
            const inp = document.getElementById('promptInp').value.trim();
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('status');
            const video = document.getElementById('outVid');

            if (!inp) return alert("Khang nhập ý tưởng đã nhé!");

            btn.disabled = true;
            status.innerHTML = "⏳ <b>Bước 1:</b> Đang dịch sang tiếng Anh...";
            video.style.display = "none";

            try {
                // Tự dịch bằng Google API
                const resT = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(inp)}`);
                const jsonT = await resT.json();
                const engText = jsonT[0][0][0];
                
                status.innerHTML = `⏳ <b>Bước 2:</b> AI đang vẽ video...<br><small>(${engText})</small>`;

                const response = await fetch(API, {
                    headers: { "Authorization": `Bearer ${KEY}`, "Content-Type": "application/json" },
                    method: "POST",
                    body: JSON.stringify({ inputs: engText }),
                });

                if (!response.ok) {
                    if (response.status === 503) throw new Error("Máy chủ AI đang khởi động, hãy đợi 20 giây rồi nhấn lại!");
                    throw new Error("Lỗi API (401/404). Có thể Token của bạn đã bị GitHub khóa trước đó.");
                }

                const blob = await response.blob();
                
                // Sửa lỗi NaN: Kiểm tra xem dữ liệu có phải là video thật không
                if (blob.size < 10000) {
                    throw new Error("Dữ liệu trả về bị lỗi (NaN). Hãy nhấn tạo lại một lần nữa!");
                }

                const vidUrl = URL.createObjectURL(blob);
                video.src = vidUrl;
                
                // Chỉ hiện video khi đã tải xong dữ liệu để tránh NaN:NaN
                video.onloadedmetadata = () => {
                    video.style.display = "block";
                    status.innerHTML = "✨ <b>Thành công!</b>";
                };

            } catch (err) {
                status.innerHTML = `<span style="color: #ff4d4d">❌ ${err.message}</span>`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
