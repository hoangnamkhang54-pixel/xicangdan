<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Khang AI Studio - Fixed</title>
    <style>
        body { background: #0a0f1e; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 40px; }
        .container { background: #161b2d; border: 1px solid #2d334a; padding: 30px; border-radius: 20px; max-width: 500px; margin: auto; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        h1 { color: #00d2ff; text-shadow: 0 0 10px rgba(0,210,255,0.3); }
        textarea { width: 100%; background: #0a0f1e; border: 1px solid #2d334a; color: #fff; padding: 12px; border-radius: 10px; margin: 15px 0; box-sizing: border-box; resize: none; }
        button { width: 100%; background: linear-gradient(45deg, #00d2ff, #3a7bd5); border: none; padding: 15px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:disabled { background: #333; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 14px; color: #8892b0; min-height: 40px; }
        .video-box { margin-top: 20px; border-radius: 12px; overflow: hidden; border: 1px solid #2d334a; display: none; background: #000; }
        video { width: 100%; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>KHANG AI STUDIO</h1>
    <textarea id="promptInput" rows="3" placeholder="Nhập ý tưởng (Ví dụ: Robot đang nhảy múa...)"></textarea>
    <button id="btn" onclick="generate()">🚀 TẠO VIDEO</button>
    
    <div id="status">Sẵn sàng tạo video cho bạn.</div>
    
    <div class="video-box" id="vBox">
        <video id="vid" controls autoplay loop></video>
    </div>
</div>

<script>
    // Chia nhỏ Token để tránh bị GitHub khóa (Token bạn gửi)
    const p1 = "hf_";
    const p2 = "bjkoprZZRYcxUjj";
    const p3 = "UOvItdWWrBfOXV";
    const p4 = "MNhnq";
    
    const KEY = p1 + p2 + p3 + p4;
    const API_URL = "https://api-inference.huggingface.co/models/ali-vilab/text-to-video-ms-1.5b";

    async function generate() {
        const input = document.getElementById('promptInput').value.trim();
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const vid = document.getElementById('vid');
        const vBox = document.getElementById('vBox');

        if (!input) return alert("Khang ơi, nhập gì đó đã!");

        btn.disabled = true;
        status.innerHTML = "⏳ <b>Bước 1:</b> Đang dịch ngôn ngữ...";
        vBox.style.display = "none";

        try {
            // Dịch sang tiếng Anh
            const resT = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(input)}`);
            const jsonT = await resT.json();
            const english = jsonT[0][0][0];
            
            status.innerHTML = `⏳ <b>Bước 2:</b> AI đang vẽ video...<br><small>(${english})</small>`;

            const response = await fetch(API_URL, {
                headers: { "Authorization": `Bearer ${KEY}`, "Content-Type": "application/json" },
                method: "POST",
                body: JSON.stringify({ inputs: english }),
            });

            if (!response.ok) {
                if (response.status === 503) throw new Error("Máy chủ AI đang khởi động, đợi 20 giây rồi nhấn lại nhé!");
                throw new Error("API gặp lỗi. Kiểm tra lại Token hoặc Hạn mức.");
            }

            const blob = await response.blob();
            
            // KIỂM TRA QUAN TRỌNG: Nếu blob quá nhỏ tức là video bị lỗi (NaN)
            if (blob.size < 10000) {
                throw new Error("Video tạo ra bị lỗi dung lượng thấp. Hãy thử lại!");
            }

            const videoUrl = URL.createObjectURL(blob);
            vid.src = videoUrl;
            
            // Đợi video tải xong metadata rồi mới hiện (Sửa lỗi NaN)
            vid.onloadedmetadata = function() {
                vBox.style.display = "block";
                status.innerHTML = "✨ <b>Thành công!</b>";
            };

        } catch (err) {
            status.innerHTML = `<span style="color: #ff4d4d">❌ ${err.message}</span>`;
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
